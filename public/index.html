<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoreTranz Artwork Enhancer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 960px;
      margin: 40px auto;
      padding: 20px;
      color: #222;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
      background: #fff;
    }

    label {
      display: block;
      font-weight: 600;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    input[type="file"],
    input[type="number"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      margin-top: 18px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      border: 0;
      border-radius: 8px;
      background: #111;
      color: #fff;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .status {
      margin-top: 16px;
      font-weight: 600;
    }

    .good {
      color: #0a7a2f;
    }

    .warn {
      color: #b26b00;
    }

    .error {
      color: #b00020;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .result-image {
      max-width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
    }

    .details p {
      margin: 8px 0;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>MoreTranz Artwork Enhancer</h1>
  <p class="muted">
    Upload your artwork, enter your desired print width, and we’ll enhance it for the best possible 300 DPI print result.
  </p>

  <div class="card">
    <form id="uploadForm">
      <label for="image">Upload Artwork</label>
      <input id="image" type="file" name="image" accept="image/*" required />

      <label for="printWidth">Desired Print Width (inches)</label>
      <input id="printWidth" type="number" name="printWidth" step="0.1" min="0.5" value="10" required />

      <button id="submitBtn" type="submit">Generate Print-Ready File</button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <div id="resultsCard" class="card hidden">
    <div class="grid">
      <div>
        <h2>Enhanced File</h2>
        <img id="resultImage" class="result-image" alt="Enhanced result" />
        <p>
          <a id="downloadLink" download="moretranz-300dpi.png">Download 300 DPI PNG</a>
        </p>
      </div>

      <div class="details">
        <h2>Print Analysis</h2>
        <p id="message"></p>
        <p id="originalSize"></p>
        <p id="originalPrint"></p>
        <p id="processing"></p>
        <p id="resultSize"></p>
        <p id="resultPrint"></p>
        <p id="requestedSize"></p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('uploadForm');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');
    const resultsCard = document.getElementById('resultsCard');
    const resultImage = document.getElementById('resultImage');
    const downloadLink = document.getElementById('downloadLink');

    const messageEl = document.getElementById('message');
    const originalSizeEl = document.getElementById('originalSize');
    const originalPrintEl = document.getElementById('originalPrint');
    const processingEl = document.getElementById('processing');
    const resultSizeEl = document.getElementById('resultSize');
    const resultPrintEl = document.getElementById('resultPrint');
    const requestedSizeEl = document.getElementById('requestedSize');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      statusEl.className = 'status';
      statusEl.textContent = 'Processing artwork...';
      resultsCard.classList.add('hidden');
      submitBtn.disabled = true;

      try {
        const formData = new FormData(form);

        const response = await fetch('/upscale', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.details || data.error || 'Request failed');
        }

        const analysis = data.analysis;

        resultImage.src = data.image;
        downloadLink.href = data.image;

        messageEl.textContent = analysis.message;
        messageEl.className = analysis.result.meetsRequestedPrintWidth ? 'good' : 'warn';

        originalSizeEl.textContent =
          `Uploaded image: ${analysis.original.widthPx} × ${analysis.original.heightPx} px`;

        originalPrintEl.textContent =
          `Original max print size at 300 DPI: ${analysis.original.maxPrintWidthAt300Dpi}" × ${analysis.original.maxPrintHeightAt300Dpi}"`;

        processingEl.textContent =
          analysis.processing.upscaleApplied
            ? `Enhancement applied: ${analysis.processing.selectedScale}x upscale`
            : 'Enhancement applied: none needed';

        resultSizeEl.textContent =
          `Processed image: ${analysis.result.widthPx} × ${analysis.result.heightPx} px`;

        resultPrintEl.textContent =
          `Processed max print size at 300 DPI: ${analysis.result.maxPrintWidthAt300Dpi}" × ${analysis.result.maxPrintHeightAt300Dpi}"`;

        requestedSizeEl.textContent =
          `Requested print size: ${analysis.desiredPrintWidthInches}" × ${analysis.recommendedPrintHeightInches}" at 300 DPI`;

        statusEl.className = 'status good';
        statusEl.textContent = 'Artwork processed successfully.';
        resultsCard.classList.remove('hidden');
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = `Error: ${err.message}`;
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>

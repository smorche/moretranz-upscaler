<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoreTranz Image Upscaler</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #111;
      color: #111;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .drop-zone {
      border: 2px dashed #3b82f6;
      border-radius: 14px;
      padding: 36px 20px;
      text-align: center;
      background: #f8fbff;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .drop-zone.dragover {
      background: #eaf2ff;
      border-color: #1d4ed8;
    }

    .drop-zone p {
      margin: 8px 0;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      background: #111827;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.95;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .field {
      margin-top: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
    }

    .preview-grid,
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .preview-box {
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 420px;
      display: block;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .meta,
    .analysis {
      font-size: 15px;
      line-height: 1.6;
      color: #374151;
    }

    .status {
      margin-top: 12px;
      font-size: 15px;
      font-weight: 600;
    }

    .success {
      color: #15803d;
    }

    .error {
      color: #b91c1c;
    }

    .download-link {
      display: inline-block;
      margin-top: 12px;
      color: #2563eb;
      text-decoration: underline;
      font-weight: 600;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 800px) {
      .preview-grid,
      .result-grid {
        grid-template-columns: 1fr;
      }

      body {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Artwork Upscaler</h1>
      <p>Upload your artwork, preview the original file, then generate a print-ready 300 DPI PNG.</p>

      <div id="dropZone" class="drop-zone">
        <p><strong>Drag & drop your artwork here</strong></p>
        <p>or</p>
        <button type="button" class="btn" id="chooseFileBtn">Choose File</button>
        <input type="file" id="fileInput" accept="image/*" hidden />
      </div>

      <div id="uploadStatus" class="status"></div>

      <div id="originalSection" class="field hidden">
        <div class="preview-grid">
          <div class="preview-box">
            <h3>Original Artwork Preview</h3>
            <img id="originalPreview" alt="Original artwork preview" />
            <div class="meta" id="originalMeta"></div>
          </div>

          <div class="preview-box">
            <h3>Print Settings</h3>

            <div class="field">
              <label for="printWidth">Desired Print Width (inches)</label>
              <input type="number" id="printWidth" min="0.5" step="0.1" value="8" />
            </div>

            <div class="field">
              <button type="button" class="btn" id="generateBtn" disabled>Generate Print-Ready File</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="resultSection" class="card hidden">
      <div class="result-grid">
        <div class="preview-box">
          <h2>Enhanced File</h2>
          <img id="enhancedPreview" alt="Enhanced artwork preview" />
          <a id="downloadLink" class="download-link" href="#" download="moretranz-print-ready-300dpi.png">Download 300 DPI PNG</a>
        </div>

        <div class="preview-box">
          <h2>Print Analysis</h2>
          <div id="analysis" class="analysis"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const chooseFileBtn = document.getElementById('chooseFileBtn');
    const fileInput = document.getElementById('fileInput');
    const uploadStatus = document.getElementById('uploadStatus');
    const originalSection = document.getElementById('originalSection');
    const originalPreview = document.getElementById('originalPreview');
    const originalMeta = document.getElementById('originalMeta');
    const printWidthInput = document.getElementById('printWidth');
    const generateBtn = document.getElementById('generateBtn');
    const resultSection = document.getElementById('resultSection');
    const enhancedPreview = document.getElementById('enhancedPreview');
    const downloadLink = document.getElementById('downloadLink');
    const analysis = document.getElementById('analysis');

    let selectedFile = null;
    let originalImageWidth = null;
    let originalImageHeight = null;

    chooseFileBtn.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files && event.target.files[0];
      if (file) {
        handleSelectedFile(file);
      }
    });

    dropZone.addEventListener('dragover', (event) => {
      event.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (event) => {
      event.preventDefault();
      dropZone.classList.remove('dragover');

      const file = event.dataTransfer.files && event.dataTransfer.files[0];
      if (file) {
        handleSelectedFile(file);
      }
    });

    function handleSelectedFile(file) {
      if (!file.type.startsWith('image/')) {
        uploadStatus.className = 'status error';
        uploadStatus.textContent = 'Please upload an image file.';
        return;
      }

      selectedFile = file;
      resultSection.classList.add('hidden');
      generateBtn.disabled = false;

      uploadStatus.className = 'status success';
      uploadStatus.textContent = 'Artwork loaded. Review the original file, then click Generate Print-Ready File.';

      const reader = new FileReader();

      reader.onload = function (e) {
        originalPreview.src = e.target.result;

        const img = new Image();
        img.onload = function () {
          originalImageWidth = img.width;
          originalImageHeight = img.height;

          originalMeta.innerHTML = `
            <strong>File:</strong> ${file.name}<br>
            <strong>Original image:</strong> ${img.width} × ${img.height} px
          `;

          originalSection.classList.remove('hidden');
        };
        img.src = e.target.result;
      };

      reader.readAsDataURL(file);
    }

    generateBtn.addEventListener('click', async () => {
      if (!selectedFile) {
        return;
      }

      const printWidth = parseFloat(printWidthInput.value);

      if (!printWidth || printWidth <= 0) {
        alert('Please enter a valid print width.');
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = 'Processing...';
      uploadStatus.className = 'status';
      uploadStatus.textContent = '';

      try {
        const formData = new FormData();
        formData.append('image', selectedFile);
        formData.append('printWidth', printWidth);

        const response = await fetch('/upscale', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Processing failed');
        }

        enhancedPreview.src = data.image;
        downloadLink.href = data.image;

        const a = data.analysis;

        analysis.innerHTML = `
          <strong>${a.message}</strong><br><br>
          Uploaded image: ${a.originalWidth} × ${a.originalHeight} px<br>
          Original max print size at 300 DPI: ${a.originalMaxPrintWidth}" × ${a.originalMaxPrintHeight}"<br>
          Enhancement applied: ${a.selectedScale} upscale<br>
          Processed image: ${a.processedWidth} × ${a.processedHeight} px<br>
          Processed max print size at 300 DPI: ${a.processedMaxPrintWidth}" × ${a.processedMaxPrintHeight}"<br>
          Requested print size: ${a.requestedPrintWidth}" × ${a.requestedPrintHeight}" at 300 DPI<br>
          Required pixels for requested size: ${a.requiredWidthPx} × ${a.requiredHeightPx} px
        `;

        resultSection.classList.remove('hidden');
        resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (error) {
        uploadStatus.className = 'status error';
        uploadStatus.textContent = error.message || 'Processing failed.';
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = 'Generate Print-Ready File';
      }
    });
  </script>
</body>
</html>
